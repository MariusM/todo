services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/todos.db
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production
    volumes:
      - todo-data:/data

volumes:
  todo-data:
